openapi: 3.1.0
info:
  version: 1.0.0
  title: Node.js Homework MongoDB Contacts API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: >
    REST API for managing authenticated user contacts with pagination,
    filtering, sorting, and optional image upload support.
tags:
  - name: Contacts
    description: Operations for managing the authenticated user's contacts.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://nodejs-hw-mongodb-hw6-email-and-images-rkz1.onrender.com
    description: Render deployment
paths:
  /contacts:
    get:
      $ref: ../swagger/paths/contacts/get.yaml
    post:
      $ref: ../swagger/paths/contacts/post.yaml
  /contacts/{contactId}:
    get:
      $ref: ../swagger/paths/contacts/{contactId}/get.yaml
    patch:
      $ref: ../swagger/paths/contacts/{contactId}/patch.yaml
    delete:
      $ref: ../swagger/paths/contacts/{contactId}/delete.yaml
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
