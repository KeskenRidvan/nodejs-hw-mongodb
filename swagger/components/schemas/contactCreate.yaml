type: object
required:
  - name
  - phoneNumber
  - contactType
properties:
  name:
    type: string
    minLength: 3
    maxLength: 20
    example: Alice Johnson
  phoneNumber:
    type: string
    minLength: 3
    maxLength: 20
    example: '+905551112233'
  email:
    type: string
    minLength: 3
    maxLength: 20
    example: alice@example.com
  isFavourite:
    type: boolean
    default: false
    example: false
  contactType:
    type: string
    enum:
      - work
      - home
      - personal
    default: personal
    example: personal
  photo:
    type: string
    format: binary
    description: Optional contact image file.
