tags:
  - Contacts
summary: Create a contact
operationId: createContact
description: Creates a new contact for the authenticated user and optionally uploads a contact photo.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        $ref: ../../components/schemas/contactCreate.yaml
responses:
  '201':
    description: Successfully created a contact.
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully created a contact!
            data:
              $ref: ../../components/schemas/contact.yaml
  '400':
    $ref: ../../components/responses/BadRequest.yaml
  '401':
    $ref: ../../components/responses/Unauthorized.yaml
