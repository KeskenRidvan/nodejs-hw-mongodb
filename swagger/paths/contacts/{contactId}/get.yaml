tags:
  - Contacts
summary: Get contact by id
operationId: getContactById
description: Returns one contact belonging to the authenticated user.
security:
  - bearerAuth: []
parameters:
  - $ref: ../../../components/parameters/contactId.yaml
responses:
  '200':
    description: Successfully found contact.
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contact!
            data:
              $ref: ../../../components/schemas/contact.yaml
  '400':
    $ref: ../../../components/responses/BadRequest.yaml
  '401':
    $ref: ../../../components/responses/Unauthorized.yaml
  '404':
    $ref: ../../../components/responses/NotFound.yaml
