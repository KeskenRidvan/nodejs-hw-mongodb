tags:
  - Contacts
summary: Get paginated contacts
operationId: getContacts
description: Returns the authenticated user's contacts with pagination, sorting, and filtering support.
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    description: Page number starting from 1.
    schema:
      type: integer
      minimum: 1
      default: 1
  - name: perPage
    in: query
    description: Number of items per page.
    schema:
      type: integer
      minimum: 1
      default: 10
  - name: sortBy
    in: query
    description: Field used for sorting.
    schema:
      type: string
      enum:
        - _id
        - name
        - phoneNumber
        - email
        - isFavourite
        - contactType
        - createdAt
        - updatedAt
      default: _id
  - name: sortOrder
    in: query
    description: Sorting order.
    schema:
      type: string
      enum:
        - asc
        - desc
      default: asc
  - name: type
    in: query
    description: Filter by contact type.
    schema:
      type: string
      enum:
        - work
        - home
        - personal
  - name: isFavourite
    in: query
    description: Filter by favourite flag.
    schema:
      type: boolean
responses:
  '200':
    description: Successfully found contacts.
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              required:
                - data
                - page
                - perPage
                - totalItems
                - totalPages
                - hasPreviousPage
                - hasNextPage
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/contact.yaml
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 10
                totalItems:
                  type: integer
                  example: 1
                totalPages:
                  type: integer
                  example: 1
                hasPreviousPage:
                  type: boolean
                  example: false
                hasNextPage:
                  type: boolean
                  example: false
  '401':
    $ref: ../../components/responses/Unauthorized.yaml
